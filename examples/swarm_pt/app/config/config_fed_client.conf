format_version = 2
# Chunk sizes for large model transfer
np_download_chunk_size = 2097152 # 20GB
tensor_download_chunk_size = 2097152 # 20GB
# Lower per-request timeout from default 600s to 120s so that streaming
# response loss is detected in ~2 min and retried, while still covering
# sender process freezes (~2 min from heavy numpy/GC ops on 20GB+ data).
np_streaming_per_request_timeout = 120
executors = [
  {
    tasks = ["train"]
    executor {
      path = "nvflare.app_common.executors.client_api_launcher_executor.ClientAPILauncherExecutor"
      args {
        launcher_id = "launcher"
        pipe_id = "pipe"
        launch_timeout = 30           # subprocess must start within 30s
        task_wait_timeout = 1200      # training must finish within 20 min
        last_result_transfer_timeout = 300  # result transfer must finish within 5 min
        heartbeat_timeout = 30        # subprocess must heartbeat every 30s
        peer_read_timeout = 300       # each pipe read times out in 5 min (large model transfer)
        params_exchange_format = "numpy"
        params_transfer_type = "DIFF"
      }
    }
  }
  {
    # All tasks prefixed with swarm_ are routed to SwarmClientController
    tasks = ["swarm_*"]
    executor {
      path = "nvflare.app_common.ccwf.SwarmClientController"
      args {
        learn_task_name = "train"
        learn_task_timeout = 3600     # full round (download + train + send result) within 1 hr
        learn_task_ack_timeout = 600  # learn task delivery ACK within 10 min (large model download)
        final_result_ack_timeout = 30 # final result broadcast ACK within 30s
        persistor_id = "persistor"
        aggregator_id = "aggregator"
        shareable_generator_id = "shareable_generator"
        min_responses_required = 2
        wait_time_after_min_resps_received = 10
        max_concurrent_submissions = 2
        request_to_submit_result_msg_timeout = 30.0
        request_to_submit_result_interval = 5.0
        request_to_submit_result_max_wait = 120.0
      }
    }
  }
]
task_result_filters = []
task_data_filters = []
components = [
  {
    id = "launcher"
    path = "nvflare.app_common.launchers.subprocess_launcher.SubprocessLauncher"
    args {
      script = "python3 custom/train_script.py --model_path /model/qwen/qwen2.5-0.5B"
      launch_once = true
    }
  }
  {
    id = "pipe"
    path = "nvflare.fuel.utils.pipe.cell_pipe.CellPipe"
    args {
      mode = "PASSIVE"
      site_name = "{SITE_NAME}"
      token = "{JOB_ID}"
      root_url = "{ROOT_URL}"
      secure_mode = "{SECURE_MODE}"
      workspace_dir = "{WORKSPACE}"
    }
  }
  {
    id = "persistor"
    path = "nvflare.app_opt.pt.file_model_persistor.PTFileModelPersistor"
    args {
      model {
        # Use Qwen wrapper for model initialization
        path = "pt.networks.qwen_wrapper.QwenModelWrapper"
        args {
          model_path = "/model/qwen/qwen2.5-0.5B"
          force_cpu = true
        }
      }
    }
  }
  {
    id = "shareable_generator"
    path = "nvflare.app_common.ccwf.comps.simple_model_shareable_generator.SimpleModelShareableGenerator"
    args {}
  }
  {
    # NoOp aggregator: skips expensive weighted averaging (~13 min for 8B model).
    # Returns 1st contribution as-is. For testing model transfer, not FL quality.
    # To restore real aggregation, change path back to:
    #   nvflare.app_common.aggregators.intime_accumulate_model_aggregator.InTimeAccumulateWeightedAggregator
    id = "aggregator"
    path = "pt.noop_aggregator.NoOpAggregator"
    args {
      expected_data_kind = "WEIGHT_DIFF"
    }
  }
  {
    id = "model_selector"
    path = "nvflare.app_common.widgets.intime_model_selector.IntimeModelSelector"
    args {}
  }
  {
    id = "result_printer"
    path = "nvflare.app_common.ccwf.comps.cwe_result_printer.CWEResultPrinter"
    args {}
  }
]
