# Create the grafana-admin Secret before applying this manifest.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: nvflare-monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
