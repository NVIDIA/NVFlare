# Single-site identity template (fill in values)
# org must match: ^[A-Za-z0-9_]+$ (no hyphens or spaces)
# type mapping:
#   client -> nvflare cert request site <name>
#   server -> nvflare cert request server <name>
#   org_admin/lead/member -> nvflare cert request user <role> <name>
name: <site_name>  # max 64 chars; no path separators; must not start with "."
org: <org_name>  # organization name; must match ^[A-Za-z0-9_]+$ (no hyphens or spaces)
type: <client|server|org_admin|lead|member>  # client/server => node kit; org_admin/lead/member => admin kit
