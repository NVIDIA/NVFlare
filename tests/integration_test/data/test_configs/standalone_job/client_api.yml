      - path: tests.integration_test.src.validators.PTModelValidator
    setup:
      - python tools/prepare_cifar10.py --root /tmp/nvflare/data
      - python tools/export_recipe_job.py --recipe_dir ../../examples/hello-world/hello-lightning --output_dir ./data/jobs --recipe_args "--algorithm scaffold --n_clients 2 --num_rounds 2"
    teardown:
      - rm -rf ./data/jobs/hello-lightning-scaffold
