# Regression tests for the ext-process Client API + streaming path (NVBug 6371056):
# the training script runs in a subprocess whose CellPipe cell must route streamed
# data (including download-service tensor transfers) to server.<jobid>. These two
# test cases also run as part of the client_api group; this group exists so the
# streaming routing path can be exercised on its own:
#   NVFLARE_TEST_FRAMEWORK=ext_process_streaming pytest system_test.py
n_servers: 1
n_clients: 2
jobs_root_dir: ./data/jobs
cleanup: True


tests:
  - test_name: "run np-loop-cell-pipe"
    event_sequence:
      - "trigger":
          "type": "server_log"
          "data": "Server started"
        "actions": [ "submit_job np_loop_cell_pipe" ]
        "result":
          "type": "job_submit_success"
      - "trigger":
          "type": "run_state"
          "data": { "run_finished": True }
        "actions": [ "ensure_current_job_done" ]
        "result":
          "type": "run_state"
          "data": { "run_finished": True }
  - test_name: "run pt-large-model-pass-through"
    event_sequence:
      - "trigger":
          "type": "server_log"
          "data": "Server started"
        "actions": [ "submit_job pt_large_model_pass_through" ]
        "result":
          "type": "job_submit_success"
      - "trigger":
          "type": "run_state"
          "data": { "run_finished": True }
        "actions": [ "ensure_current_job_done" ]
        "result":
          "type": "run_state"
          "data": { "run_finished": True }
