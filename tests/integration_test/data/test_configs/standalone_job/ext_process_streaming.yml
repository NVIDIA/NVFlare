# Regression tests for external-process Client API streaming (NVBug 6371056).
# np_loop_cell_pipe is the small-payload launch-once control, while
# pt_large_model_pass_through exercises DownloadService-backed tensors. Both
# jobs use the ClientAPIExecutor external-process backend. This file is the only
# home of these two test cases; test_configs.yml lists it under both the
# client_api group and the ext_process_streaming group, so the streaming path
# can also be exercised on its own:
#   NVFLARE_TEST_FRAMEWORK=ext_process_streaming pytest system_test.py
project_yaml: ./data/projects/client_api.yml
jobs_root_dir: ./data/jobs
cleanup: True


tests:
  - test_name: "run np-loop-external-process"
    event_sequence:
      - "trigger":
          "type": "server_log"
          "data": "Server started"
        "actions": [ "submit_job np_loop_cell_pipe" ]
        "result":
          "type": "job_submit_success"
      - "trigger":
          "type": "run_state"
          "data": { "run_finished": True }
        "actions": [ "ensure_current_job_done" ]
        "result":
          "type": "run_state"
          "data": { "run_finished": True }
  - test_name: "run pt-large-model-pass-through"
    event_sequence:
      - "trigger":
          "type": "server_log"
          "data": "Server started"
        "actions": [ "submit_job pt_large_model_pass_through" ]
        "result":
          "type": "job_submit_success"
      - "trigger":
          "type": "run_state"
          "data": { "run_finished": True }
        "actions": [ "ensure_current_job_done" ]
        "result":
          "type": "run_state"
          "data": { "run_finished": True }
