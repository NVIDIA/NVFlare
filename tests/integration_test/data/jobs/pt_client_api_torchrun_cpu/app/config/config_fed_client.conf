{
  format_version = 2
  app_script = "torchrun_client.py"
  app_config = ""
  executors = [
    {
      tasks = ["train"]
      executor {
        path = "nvflare.app_common.executors.client_api_executor.ClientAPIExecutor"
        args {
          execution_mode = "external_process"
          command = "python3 -m torch.distributed.run --standalone --nproc_per_node=2 custom/{app_script} {app_config}"
          launch_once = false
          shutdown_timeout = 30
          heartbeat_timeout = 60
          params_exchange_format = "pytorch"
          server_expected_format = "numpy"
          params_transfer_type = "FULL"
          train_with_evaluation = false
        }
      }
    }
  ]
  task_data_filters = []
  task_result_filters = []
  components = []
}
