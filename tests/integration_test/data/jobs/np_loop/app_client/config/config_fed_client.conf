{
  format_version = 2
  app_script = "train_loop.py"
  app_config = ""
  executors = [
    {
      tasks = ["train"]
      executor {
        path = "nvflare.app_common.executors.client_api_executor.ClientAPIExecutor"
        args {
          execution_mode = "external_process"
          command = "python3 custom/{app_script} {app_config}"
          launch_once = true
          heartbeat_timeout = 60
          params_exchange_format = "numpy"
          server_expected_format = "numpy"
          params_transfer_type = "FULL"
          train_with_evaluation = true
        }
      }
    }
  ]
  task_data_filters = []
  task_result_filters = []
  components = []
}
