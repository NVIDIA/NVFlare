apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nvflare-server.name" . }}-ingress
  labels:
    {{- include "nvflare-server.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/websocket-services: {{ include "nvflare-server.name" . }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/server-snippet: |
      listen {{ .Values.ingressPort }} ssl;
      listen [::]:{{ .Values.ingressPort }} ssl;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "nvflare-server.name" . }}
                port:
                  number: {{ .Values.fedLearnPort }}
