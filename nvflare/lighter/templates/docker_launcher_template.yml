docker_launcher_cln_sh: |
  #!/usr/bin/env bash
  # Generated by NVFlare provisioning — Docker mode client startup script.
  # Run this instead of start.sh to start this client site in Docker mode.
  # The SP/CP container mounts the Docker socket so it can launch SJ/CJ containers per job.
  # The site admin must build the Docker image before running this script.
  DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" >/dev/null 2>&1 && pwd )"
  HOST_WORKSPACE="$(cd "$DIR/.." && pwd)"
  DOCKER_IMAGE=${NVFL_P_IMAGE:-{~~docker_image~~}}

  if ! docker info > /dev/null 2>&1; then
    echo "ERROR: cannot connect to Docker daemon. Make sure your user has permission to run docker."
    echo "  Option 1 (docker group): sudo usermod -aG docker \$USER  then log out and back in."
    echo "  Option 2 (rootless Docker): https://docs.docker.com/engine/security/rootless/"
    exit 1
  fi

  echo "Starting NVFlare client {~~client_name~~} with image $DOCKER_IMAGE"
  echo "Host workspace: $HOST_WORKSPACE"

  NETWORK_NAME="nvflare-network"
  if ! docker network ls --filter name=$NETWORK_NAME --format "{{.Name}}" | grep -wq $NETWORK_NAME; then
      docker network create $NETWORK_NAME
      echo "Created Docker network: $NETWORK_NAME"
  fi

  # Remove stale PID file — in Docker the main process is always PID 1, so the
  # file left by a previous container would incorrectly block a fresh start.
  rm -f "$HOST_WORKSPACE/daemon_pid.fl"

  docker run --name {~~client_name~~} \
    --user "$(id -u):$(id -g)" \
    --network $NETWORK_NAME \
    -v "$HOST_WORKSPACE":/var/tmp/nvflare/workspace \
    -v /var/run/docker.sock:/var/run/docker.sock \
    -e NVFL_DOCKER_WORKSPACE="$HOST_WORKSPACE" \
    --rm $DOCKER_IMAGE \
    /var/tmp/nvflare/workspace/startup/sub_start.sh

