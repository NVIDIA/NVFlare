apiVersion: v1
kind: Namespace
metadata:
  name: nvflare-monitoring
  labels:
    app.kubernetes.io/name: nvflare-monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: statsd-exporter
  namespace: nvflare-monitoring
  labels:
    app: statsd-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statsd-exporter
  template:
    metadata:
      labels:
        app: statsd-exporter
    spec:
      containers:
        - name: statsd-exporter
          image: prom/statsd-exporter:v0.29.0
          args:
            - --statsd.listen-udp=:9125
            - --statsd.listen-tcp=:9125
            - --web.listen-address=:9102
          ports:
            - {name: statsd-udp, containerPort: 9125, protocol: UDP}
            - {name: statsd-tcp, containerPort: 9125, protocol: TCP}
            - {name: metrics, containerPort: 9102, protocol: TCP}
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: statsd-exporter
  namespace: nvflare-monitoring
  labels:
    app: statsd-exporter
spec:
  type: ClusterIP
  selector:
    app: statsd-exporter
  ports:
    - {name: statsd-udp, port: 9125, protocol: UDP, targetPort: statsd-udp}
    - {name: statsd-tcp, port: 9125, protocol: TCP, targetPort: statsd-tcp}
    - {name: metrics, port: 9102, protocol: TCP, targetPort: metrics}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: nvflare-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: statsd
        static_configs:
          - targets: ["statsd-exporter:9102"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: nvflare-monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.10.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - {name: http, containerPort: 9090}
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus}
            - {name: data, mountPath: /prometheus}
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: nvflare-monitoring
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - {name: http, port: 9090, targetPort: http}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: nvflare-monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: nvflare-monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:12.4.1
          ports:
            - {name: http, containerPort: 3000}
          env:
            - {name: GF_SECURITY_ADMIN_USER, value: admin}
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: admin}
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: nvflare-monitoring
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - {name: http, port: 3000, targetPort: http}
